interface=sdr0
driver=nl80211
country_code=BE
ssid=openwifi
hw_mode=a
channel=44
supported_rates=60 90 120 180 240 360 480 540
basic_rates=60 90 120 180

# Enable WMM (802.11e EDCA) for priority-based channel access
wmm_enabled=1

# EDCA parameters: AC_BK, AC_BE, AC_VI, AC_VO
# Format: wmm_ac_XX_cwmin cwmax aifs txop_limit acm
#   cwmin/cwmax: CW exponent (CW = 2^val - 1)
#   aifs: AIFS value (number of slot times after SIFS)
#   txop_limit: TXOP limit in units of 32 microseconds
#   acm: admission control mandatory (0=no, 1=yes)

# AC_BK (Background) - lowest priority
wmm_ac_bk_cwmin=4
wmm_ac_bk_cwmax=10
wmm_ac_bk_aifs=7
wmm_ac_bk_txop_limit=0
wmm_ac_bk_acm=0

# AC_BE (Best Effort) - default
wmm_ac_be_cwmin=4
wmm_ac_be_cwmax=10
wmm_ac_be_aifs=3
wmm_ac_be_txop_limit=0
wmm_ac_be_acm=0

# AC_VI (Video) - high priority
wmm_ac_vi_cwmin=3
wmm_ac_vi_cwmax=4
wmm_ac_vi_aifs=2
wmm_ac_vi_txop_limit=94
wmm_ac_vi_acm=0

# AC_VO (Voice) - highest priority (used for mission-critical TDMA traffic)
wmm_ac_vo_cwmin=2
wmm_ac_vo_cwmax=3
wmm_ac_vo_aifs=2
wmm_ac_vo_txop_limit=47
wmm_ac_vo_acm=0
